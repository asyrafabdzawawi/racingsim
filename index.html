<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racing Queue</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    background: url('https://images.unsplash.com/photo-1542362567-b07e54358753') no-repeat center/cover;
    overflow: hidden;
}

/* overlay gelap + merah */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(black, rgba(255,0,0,0.4));
}

/* container utama */
.container {
    position: relative;
    text-align: center;
    padding: 40px;
    border-radius: 20px;
    background: rgba(0,0,0,0.6);
    box-shadow: 0 0 40px red;
    backdrop-filter: blur(10px);
}

/* tajuk */
.title {
    font-size: 40px;
    color: white;
    margin-bottom: 10px;
    text-shadow: 0 0 10px red;
}

.subtitle {
    color: #ff4d4d;
    letter-spacing: 3px;
    margin-bottom: 20px;
}

/* nombor besar */
.number {
    font-size: 180px;
    font-weight: 800;
    color: white;
    text-shadow:
        0 0 10px red,
        0 0 30px red,
        0 0 60px red;
    margin: 20px 0;
}

/* logo */
.logo {
    width: 200px;
    margin-top: 20px;
    filter: drop-shadow(0 0 10px red);
}

/* button */
button {
    padding: 15px 30px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    background: linear-gradient(45deg, #ff0000, #990000);
    box-shadow: 0 0 15px red;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px red;
}

.reset {
    background: linear-gradient(45deg, #444, #222);
}
</style>
</head>

<body>

<div class="container">
    <div class="title">GILIRAN</div>
    <div class="subtitle">RACING SIM</div>

    <div class="number" id="number">1</div>

    <button onclick="nextNumber()">NEXT</button>
    <button class="reset" onclick="resetNumber()">RESET</button>

    <br>
    <img src="logo.png" class="logo">
</div>

<script>
let current = 1;
const max = 15;

function nextNumber() {
    if (current < max) {
        current++;
        document.getElementById("number").innerText = current;
    } else {
        alert("Giliran tamat!");
    }
}

function resetNumber() {
    current = 1;
    document.getElementById("number").innerText = current;
}
</script>

</body>
</html>
