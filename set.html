<!DOCTYPE html>
<html>
<head>
<title>Set Number</title>
</head>

<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDguY_Y8cCpIXhgYzMHaM-qnQkbGoxmuMs",
  authDomain: "racingsim-cfbeb.firebaseapp.com",
  databaseURL: "https://racingsim-cfbeb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "racingsim-cfbeb",
  storageBucket: "racingsim-cfbeb.firebasestorage.app",
  messagingSenderId: "382495347924",
  appId: "1:382495347924:web:1573810d27be8bcd251741"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// AMBIL NOMBOR DARI URL
const params = new URLSearchParams(window.location.search);
const num = params.get("r");

// UPDATE DATABASE
if (num) {
  set(ref(db, "racing/number"), parseInt(num));
}

// AUTO CLOSE (optional)
setTimeout(() => {
  window.close();
}, 500);

</script>

</body>
</html>
